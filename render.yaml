services:
  - type: web
    name: cineverse-backend
    runtime: python
    repo: https://github.com/DarkSyntax-star/cineverse-backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./movie.db